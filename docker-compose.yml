services:
  entra-ca-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: entra-ca-manager:latest
    container_name: entra-ca-manager
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - entra_ca_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  entra_ca_data:
