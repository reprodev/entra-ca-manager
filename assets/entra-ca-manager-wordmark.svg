<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Entra CA Manager Wordmark</title>
  <desc id="desc">Entra CA Manager logo with shield icon and product name.</desc>
  <defs>
    <linearGradient id="iconBg" x1="24" y1="20" x2="260" y2="260" gradientUnits="userSpaceOnUse">
