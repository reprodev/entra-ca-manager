<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA Manager Sign In</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --card: #ffffff;
      --text: #121826;
      --muted: #5b6478;
      --primary: #185fa5;
      --border: #dbe1ea;
      --danger-bg: #fff0f0;
      --danger-text: #9e2d2d;
      --success-bg: #f1fbef;
      --success-text: #286731;
      --info-bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at 25% 15%, #eaf3ff 0%, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 16px 45px rgba(17, 24, 39, 0.10);
      padding: 24px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }
    .shield {
      width: 20px;
      height: 20px;
      border-radius: 7px;
      background: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
    }
    h1 { margin: 14px 0 8px; font-size: 27px; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.5; }
    .section {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      background: #fbfcff;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 12px;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(0.96); }
    .btn.secondary {
      margin-top: 10px;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .info {
      margin-top: 15px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--muted);
      background: var(--info-bg);
      line-height: 1.6;
    }
    .error {
      margin-top: 15px;
      border: 1px solid #ffd2d2;
      background: var(--danger-bg);
      color: var(--danger-text);
      border-radius: 10px;
      font-size: 12px;
      padding: 9px 11px;
      display: none;
    }
    .success {
      margin-top: 10px;
      border: 1px solid #cbe9c8;
      background: var(--success-bg);
      color: var(--success-text);
      border-radius: 10px;
      font-size: 12px;
      padding: 9px 11px;
      display: none;
    }
    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge"><span class="shield">CA</span> CA Manager MSP Edition</div>
    <h1>Sign in to continue</h1>
    <p>Use Microsoft SSO or local credentials. All SSO users must be provisioned in the local directory.</p>

    <div class="section" id="ssoSection">
      <div class="section-title">Microsoft SSO</div>
      <button class="btn" id="ssoBtn" type="button" onclick="startSsoLogin()">Continue with Microsoft</button>
      <div class="hint" id="ssoHint"></div>
    </div>

    <div class="section" id="localSection">
      <div class="section-title">Local Credentials</div>
      <div class="field">
        <label class="label" for="emailInput">Email</label>
        <input class="input" id="emailInput" type="email" placeholder="analyst@kontoso.com" autocomplete="username">
      </div>
      <div class="field">
        <label class="label" for="passwordInput">Password</label>
        <input class="input" id="passwordInput" type="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn secondary" id="localBtn" type="button" onclick="submitLocalLogin()">Sign in with credentials</button>
      <div class="hint" id="localHint"></div>
      <div class="success" id="successText"></div>
    </div>

    <div class="section hidden" id="resetSection">
      <div class="section-title">Required Password Reset</div>
      <div class="field">
        <label class="label" for="currentPasswordInput">Current password</label>
        <input class="input" id="currentPasswordInput" type="password" autocomplete="current-password">
      </div>
      <div class="field">
        <label class="label" for="newPasswordInput">New password</label>
        <input class="input" id="newPasswordInput" type="password" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="label" for="confirmPasswordInput">Confirm new password</label>
        <input class="input" id="confirmPasswordInput" type="password" autocomplete="new-password">
      </div>
      <button class="btn" id="changePasswordBtn" type="button" onclick="submitPasswordChange()">Change password</button>
      <div class="hint" id="passwordPolicyHint"></div>
    </div>

    <button class="btn secondary" id="dashboardBtn" type="button" onclick="window.location.href='/'">Open dashboard (demo)</button>
    <div class="info" id="statusText">Checking sign-in configuration...</div>
    <div class="error" id="errorText"></div>
  </main>

  <script>
    let authStatus = null;

    function errorMessageFromPayload(payload, fallback) {
      if (!payload) return fallback;
      if (payload.error && typeof payload.error === 'object') {
        return payload.error.message || fallback;
      }
      if (typeof payload.error === 'string') {
        return payload.error;
      }
      return fallback;
    }

    function errorCodeFromPayload(payload) {
      if (!payload) return '';
      if (payload.error && typeof payload.error === 'object') {
        return String(payload.error.code || '').trim();
      }
      return String(payload.code || '').trim();
    }

    function showError(message) {
      const error = document.getElementById('errorText');
      error.textContent = message;
      error.style.display = 'block';
    }

    function showSuccess(message) {
      const success = document.getElementById('successText');
      success.textContent = message;
      success.style.display = 'block';
    }

    function clearMessages() {
      document.getElementById('errorText').style.display = 'none';
      document.getElementById('successText').style.display = 'none';
    }

    function showResetSection() {
      document.getElementById('resetSection').classList.remove('hidden');
      document.getElementById('localSection').classList.remove('hidden');
      showError('Password reset is required before you can access the dashboard.');
    }

    function lockoutMessage(lockedUntil) {
      if (!lockedUntil) {
        return 'Account is locked. Please wait and try again.';
      }
      const date = new Date(lockedUntil);
      if (Number.isNaN(date.getTime())) {
        return 'Account is locked. Please wait and try again.';
      }
      return `Account is locked until ${date.toLocaleString('en-GB')}.`;
    }

    function startSsoLogin() {
      window.location.href = '/auth/login?returnTo=/';
    }

    async function submitLocalLogin() {
      clearMessages();
      const localBtn = document.getElementById('localBtn');
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      localBtn.disabled = true;
      try {
        const response = await fetch('/auth/local-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, returnTo: '/' })
        });
        const data = await response.json();
        if (!data.ok) {
          const code = errorCodeFromPayload(data);
          if (code === 'account_locked') {
            showError(lockoutMessage(data.error.lockedUntil));
          } else {
            showError(errorMessageFromPayload(data, 'Sign-in failed.'));
          }
          return;
        }

        if (data.mustResetPassword) {
          showResetSection();
          return;
        }

        showSuccess('Sign-in successful. Redirecting...');
        window.location.href = data.redirectTo || '/';
      } catch (error) {
        showError('Unable to sign in: ' + error.message);
      } finally {
        localBtn.disabled = false;
      }
    }

    async function submitPasswordChange() {
      clearMessages();
      const currentPassword = document.getElementById('currentPasswordInput').value;
      const newPassword = document.getElementById('newPasswordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;
      const button = document.getElementById('changePasswordBtn');

      if (!currentPassword || !newPassword) {
        showError('Current and new password are required.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('New password and confirmation do not match.');
        return;
      }

      button.disabled = true;
      try {
        const response = await fetch('/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await response.json();
        if (!data.ok) {
          showError(errorMessageFromPayload(data, 'Password change failed.'));
          return;
        }

        showSuccess('Password changed. Redirecting to dashboard...');
        window.location.href = '/';
      } catch (error) {
        showError('Unable to change password: ' + error.message);
      } finally {
        button.disabled = false;
      }
    }

    function hydrateErrorFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const errorCode = params.get('error');
      const reset = params.get('reset');
      const errorMap = {
        callback: 'Sign-in callback was invalid or expired. Please try again.',
        signin: 'Sign-in failed. Verify SSO settings and try again.',
        config: 'Authentication is enabled but configuration is incomplete.',
        session: 'Your session is no longer valid. Please sign in again.',
        directory: 'SSO sign-in is blocked until your user is provisioned in the local directory.',
        directory_user_missing: 'SSO sign-in is blocked until your user is provisioned in the local directory.',
        sso_not_allowed: 'This account is not allowed to use SSO.',
        account_disabled: 'This account is disabled. Contact an administrator.',
        unauthorized: 'Your account is not authorized for this app.'
      };

      if (reset === 'required') {
        showResetSection();
      }

      if (errorCode && errorMap[errorCode]) {
        showError(errorMap[errorCode]);
      }
    }

    async function hydrateStatus() {
      const statusEl = document.getElementById('statusText');
      const ssoBtn = document.getElementById('ssoBtn');
      const localBtn = document.getElementById('localBtn');
      const dashboardBtn = document.getElementById('dashboardBtn');
      const ssoHint = document.getElementById('ssoHint');
      const localHint = document.getElementById('localHint');
      const passwordPolicyHint = document.getElementById('passwordPolicyHint');

      try {
        const response = await fetch('/auth/status');
        const data = await response.json();
        authStatus = data.auth || {};
        const providers = authStatus.providers || {};
        const hardening = authStatus.hardening || {};
        const sso = providers.sso || {};
        const local = providers.local || {};

        if (!authStatus.enabled) {
          ssoBtn.disabled = true;
          localBtn.disabled = true;
          dashboardBtn.style.display = 'block';
          statusEl.textContent = 'Authentication is disabled in this environment. Use "Open dashboard" for demo mode.';
          ssoHint.textContent = 'SSO disabled.';
          localHint.textContent = 'Local login disabled.';
          return;
        }

        dashboardBtn.style.display = 'none';
        ssoBtn.disabled = !(sso.enabled && sso.configured);
        localBtn.disabled = !(local.enabled && local.configured);

        statusEl.innerHTML = [
          `<strong>SSO:</strong> ${sso.enabled ? (sso.configured ? 'Enabled' : 'Enabled (incomplete)') : 'Disabled'}`,
          `<strong>Local credentials:</strong> ${local.enabled ? (local.configured ? 'Enabled' : 'Enabled (error)') : 'Disabled'}`,
          `<strong>Directory guard:</strong> ${hardening.directoryGuard ? 'Required' : 'Optional'}`,
          `<strong>Lockout:</strong> ${hardening.lockout ? `${hardening.lockout.maxAttempts} attempts / ${hardening.lockout.windowMinutes} min` : 'N/A'}`
        ].join('<br>');

        ssoHint.textContent = sso.reason || '';
        localHint.textContent = local.reason || '';

        if (hardening.passwordPolicy) {
          passwordPolicyHint.textContent = `Password policy: min ${hardening.passwordPolicy.minLength} chars with upper, lower, number, and symbol.`;
        }

        if (data.session && data.session.mustResetPassword) {
          showResetSection();
        }

        if (sso.enabled && !sso.configured && sso.reason) {
          showError(sso.reason);
        }
        if (local.enabled && !local.configured && local.reason) {
          showError(local.reason);
        }
      } catch (error) {
        statusEl.textContent = 'Could not verify authentication configuration.';
        showError('Unable to load auth status: ' + error.message);
      }
    }

    hydrateErrorFromQuery();
    hydrateStatus();
  </script>
</body>
</html>
